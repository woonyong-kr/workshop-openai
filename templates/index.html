<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flask + MongoDB</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: rgb({{ r }}, {{ g }}, {{ b }});
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      transition: background-color 0.3s ease;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 40px 60px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    h1 {
      font-size: 1.6rem;
      color: #333;
      margin-bottom: 12px;
    }

    .color-box {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: rgb({{ r }}, {{ g }}, {{ b }});
      border: 3px solid rgba(0,0,0,0.1);
      margin: 0 auto 16px;
    }

    p {
      color: #666;
      font-size: 0.95rem;
    }

    code {
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="color-box"></div>
    <h1>Flask + MongoDB 서버</h1>
    <p>현재 배경색: <code>rgb({{ r }}, {{ g }}, {{ b }})</code></p>
    <p style="margin-top:8px;">.env 파일의 <code>BG_R</code>, <code>BG_G</code>, <code>BG_B</code> 값을 수정하면 반영됩니다.</p>
  </div>
</body>
</html>
