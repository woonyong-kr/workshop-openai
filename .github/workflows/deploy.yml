name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app

            # 최신 코드 pull (EC2 로컬 변경사항 무시하고 원격으로 덮어씌움)
            git fetch origin
            git reset --hard origin/main

            # 민감 환경변수 복원 (GitHub Secret → EC2 파일)
            echo "${{ secrets.ENV_FILE }}" > .env.secret

            mkdir -p logs

            # node 없으면 자동 설치
            command -v node || sudo apt install -y nodejs npm

            # Python 의존성 + npm 설치
            make deps

            # Tailwind CSS 빌드 (템플릿 변경 반영)
            make build-css

            # 서비스 재시작
            sudo systemctl restart flask-app

            echo "배포 완료"
